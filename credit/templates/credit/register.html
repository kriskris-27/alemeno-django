<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register Customer</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 2rem auto; }
    form { display: grid; gap: 0.5rem; }
    label { font-weight: 600; }
    input { padding: 0.4rem; font-size: 1rem; }
    button { padding: 0.6rem; font-size: 1rem; cursor: pointer; }
    .message { margin-top: 1rem; padding: 0.75rem; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <h1>Register Customer</h1>
  <form id="register-form">
    <label>First Name <input name="first_name" required></label>
    <label>Last Name <input name="last_name" required></label>
    <label>Age <input name="age" type="number" min="0" value="30"></label>
    <label>Monthly Income <input name="monthly_income" type="number" min="0" value="75000" required></label>
    <label>Phone Number <input name="phone_number" required></label>
    <button type="submit">Submit</button>
  </form>
  <div id="result" class="message" style="display:none;"></div>

  <script>
    const form = document.getElementById('register-form');
    const resultBox = document.getElementById('result');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form).entries());
      try {
        const resp = await fetch('/register/', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(data)
        });
        const json = await resp.json();
        resultBox.style.display = 'block';
        resultBox.textContent = resp.ok
          ? `Registered: ID ${json.customer_id}, Name ${json.name}, Approved Limit ${json.approved_limit}`
          : `Error: ${json.detail || JSON.stringify(json)}`;
      } catch (err) {
        resultBox.style.display = 'block';
        resultBox.textContent = `Error: ${err}`;
      }
    });
  </script>
</body>
</html>
